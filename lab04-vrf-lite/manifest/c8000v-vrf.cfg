! c8000v VRF lite configuration for multi-tenant isolation with route leaking
! This REPLACES the base BGP config — run 'no router bgp 64514' first
!
! Tenant A (hub, VLAN 100): isolated
! Tenant B (spoke, VLAN 200): isolated
! Tenant C (hub, VLAN 300): can reach both A and B via route-target import
!
! VRF definitions with route-target policies
vrf definition TENANT-A
 rd 64514:100
 address-family ipv4
  route-target export 64514:100
  route-target import 64514:100
  route-target import 64514:300
 exit-address-family
!
vrf definition TENANT-B
 rd 64514:200
 address-family ipv4
  route-target export 64514:200
  route-target import 64514:200
  route-target import 64514:300
 exit-address-family
!
vrf definition TENANT-C
 rd 64514:300
 address-family ipv4
  route-target export 64514:300
  route-target import 64514:300
  route-target import 64514:100
  route-target import 64514:200
 exit-address-family
!
! VLAN sub-interfaces
interface GigabitEthernet1.100
 encapsulation dot1Q 100
 vrf forwarding TENANT-A
 ip address 172.16.100.50 255.255.255.0
 no shutdown
!
interface GigabitEthernet1.200
 encapsulation dot1Q 200
 vrf forwarding TENANT-B
 ip address 172.16.200.50 255.255.255.0
 no shutdown
!
interface GigabitEthernet1.300
 encapsulation dot1Q 300
 vrf forwarding TENANT-C
 ip address 172.16.150.50 255.255.255.0
 no shutdown
!
! BGP with per-VRF address-families
router bgp 64514
 bgp router-id 172.16.252.50
 bgp log-neighbor-changes
 !
 ! Tenant A neighbors (hub nodes over VLAN 100)
 address-family ipv4 vrf TENANT-A
  neighbor 172.16.100.61 remote-as 64512
  neighbor 172.16.100.61 activate
  neighbor 172.16.100.61 description hub-master-0
  neighbor 172.16.100.62 remote-as 64512
  neighbor 172.16.100.62 activate
  neighbor 172.16.100.62 description hub-master-1
  neighbor 172.16.100.63 remote-as 64512
  neighbor 172.16.100.63 activate
  neighbor 172.16.100.63 description hub-master-2
 exit-address-family
 !
 ! Tenant B neighbors (spoke worker over VLAN 200)
 address-family ipv4 vrf TENANT-B
  neighbor 172.16.200.64 remote-as 64513
  neighbor 172.16.200.64 activate
  neighbor 172.16.200.64 description spoke-worker-1
 exit-address-family
 !
 ! Tenant C neighbors (hub nodes over VLAN 300, AS 64515)
 address-family ipv4 vrf TENANT-C
  neighbor 172.16.150.61 remote-as 64515
  neighbor 172.16.150.61 activate
  neighbor 172.16.150.61 description hub-master-0
  neighbor 172.16.150.62 remote-as 64515
  neighbor 172.16.150.62 activate
  neighbor 172.16.150.62 description hub-master-1
  neighbor 172.16.150.63 remote-as 64515
  neighbor 172.16.150.63 activate
  neighbor 172.16.150.63 description hub-master-2
 exit-address-family
!
end
