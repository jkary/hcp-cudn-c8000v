---
# FRRConfiguration for Tenant A on hub — peers over VLAN 100 in tenant VRF
apiVersion: frrk8s.metallb.io/v1beta1
kind: FRRConfiguration
metadata:
  name: tenant-a-bgp
  namespace: openshift-frr-k8s
  labels:
    network: tenant-a-net
spec:
  bgp:
    routers:
    - asn: 64512
      vrf: tenant-a-net
      prefixes:
      - 10.100.0.0/16
      neighbors:
      - address: 172.16.100.50
        asn: 64514
        disableMP: true
        toReceive:
          allowed:
            mode: all
        toAdvertise:
          allowed:
            mode: all
      - address: 172.16.101.50
        asn: 64514
        disableMP: true
        toReceive:
          allowed:
            mode: all
        toAdvertise:
          allowed:
            mode: all
---
# RouteAdvertisements for Tenant A — targetVRF keeps routes in tenant VRF
apiVersion: k8s.ovn.org/v1
kind: RouteAdvertisements
metadata:
  name: tenant-a-routes
spec:
  targetVRF: tenant-a-net
  advertisements:
  - PodNetwork
  networkSelectors:
  - networkSelectionType: ClusterUserDefinedNetworks
    clusterUserDefinedNetworkSelector:
      networkSelector:
        matchLabels:
          advertise: "true"
  nodeSelector: {}
  frrConfigurationSelector:
    matchLabels:
      network: tenant-a-net
