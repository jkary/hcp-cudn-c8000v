  tags: ['tenants']

- name: 'Assign VLAN interfaces to OVN VRFs on hub nodes'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Wait for OVN VRF devices to be created'
      ansible.builtin.pause:
        seconds: 15

    - name: 'Move VLAN interfaces into tenant VRFs on each hub node'
      kubernetes.core.k8s_exec:
        namespace: openshift-frr-k8s
        pod: "{{ item }}"
        container: frr
        command: >-
          nsenter -t 1 -n -- sh -c '
          ip link set enp3s0.100 master tenant-a-net 2>/dev/null;
          ip link set enp3s0.300 master tenant-c-net 2>/dev/null;
          ip link set ens1.100 master tenant-a-net 2>/dev/null;
          ip link set ens1.300 master tenant-c-net 2>/dev/null;
          TABLE_A=$(ip vrf show | grep tenant-a | awk "{print \$2}");
          TABLE_C=$(ip vrf show | grep tenant-c | awk "{print \$2}");
          IP_A=$(ip -4 addr show enp3s0.100 | grep "inet " | awk "{print \$2}" | cut -d/ -f1);
          IP_C=$(ip -4 addr show enp3s0.300 | grep "inet " | awk "{print \$2}" | cut -d/ -f1);
          IP_A2=$(ip -4 addr show ens1.100 | grep "inet " | awk "{print \$2}" | cut -d/ -f1);
          IP_C2=$(ip -4 addr show ens1.300 | grep "inet " | awk "{print \$2}" | cut -d/ -f1);
          ip route replace 172.16.100.0/24 dev enp3s0.100 table $TABLE_A proto kernel scope link src $IP_A 2>/dev/null;
          ip route replace 172.16.150.0/24 dev enp3s0.300 table $TABLE_C proto kernel scope link src $IP_C 2>/dev/null;
          ip route replace 172.16.101.0/24 dev ens1.100 table $TABLE_A proto kernel scope link src $IP_A2 2>/dev/null;
          ip route replace 172.16.151.0/24 dev ens1.300 table $TABLE_C proto kernel scope link src $IP_C2 2>/dev/null;
          echo "Done"'
      loop: "{{ query('kubernetes.core.k8s', api_version='v1', kind='Pod', namespace='openshift-frr-k8s', label_selector='app=frr-k8s', kubeconfig=hub_kubeconfig) | map(attribute='metadata.name') | list }}"
      loop_control:
        label: "{{ item }}"
      ignore_errors: true

    - name: 'Set VLAN tags on OVN localnet ports for hub tenants'
      kubernetes.core.k8s_exec:
        namespace: openshift-ovn-kubernetes
        pod: "{{ query('kubernetes.core.k8s', api_version='v1', kind='Pod', namespace='openshift-ovn-kubernetes', label_selector='app=ovnkube-node', kubeconfig=hub_kubeconfig) | map(attribute='metadata.name') | first }}"
        container: ovnkube-controller
        command: >-
          sh -c '
          for port in $(ovn-nbctl --columns=name find logical_switch_port type=localnet | grep "tenant.a.net" | awk -F\" "{print \$2}"); do
            ovn-nbctl set logical_switch_port "$port" tag=100;
          done;
          for port in $(ovn-nbctl --columns=name find logical_switch_port type=localnet | grep "tenant.c.net" | awk -F\" "{print \$2}"); do
            ovn-nbctl set logical_switch_port "$port" tag=300;
          done;
          echo "VLAN tags set";
          ovn-nbctl --columns=name,tag find logical_switch_port type=localnet'
      ignore_errors: true

  tags: ['vrf-assign']

- name: 'Assign VLAN interface to OVN VRF on spoke worker'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ spoke_kubeconfig }}"

  tasks:
    - name: 'Move VLAN 200 into tenant-b-net VRF on spoke'
      kubernetes.core.k8s_exec:
        namespace: openshift-frr-k8s
        pod: "{{ query('kubernetes.core.k8s', api_version='v1', kind='Pod', namespace='openshift-frr-k8s', label_selector='app=frr-k8s', kubeconfig=spoke_kubeconfig) | map(attribute='metadata.name') | first }}"
        container: frr
        command: >-
          nsenter -t 1 -n -- sh -c '
          ip link set enp3s0.200 master tenant-b-net 2>/dev/null;
          ip link set ens1.200 master tenant-b-net 2>/dev/null;
          TABLE_B=$(ip vrf show | grep tenant-b | awk "{print \$2}");
          IP_B=$(ip -4 addr show enp3s0.200 | grep "inet " | awk "{print \$2}" | cut -d/ -f1);
          IP_B2=$(ip -4 addr show ens1.200 | grep "inet " | awk "{print \$2}" | cut -d/ -f1);
          ip route replace 172.16.200.0/24 dev enp3s0.200 table $TABLE_B proto kernel scope link src $IP_B 2>/dev/null;
          ip route replace 172.16.201.0/24 dev ens1.200 table $TABLE_B proto kernel scope link src $IP_B2 2>/dev/null;
          echo "Done"'
      ignore_errors: true

    - name: 'Set VLAN tag on OVN localnet port for spoke tenant B'
      kubernetes.core.k8s_exec:
        namespace: openshift-ovn-kubernetes
        pod: "{{ query('kubernetes.core.k8s', api_version='v1', kind='Pod', namespace='openshift-ovn-kubernetes', label_selector='app=ovnkube-node', kubeconfig=spoke_kubeconfig) | map(attribute='metadata.name') | first }}"
        container: ovnkube-controller
        command: >-
          sh -c '
          for port in $(ovn-nbctl --columns=name find logical_switch_port type=localnet | grep "tenant.b.net" | awk -F\" "{print \$2}"); do
            ovn-nbctl set logical_switch_port "$port" tag=200;
          done;
          echo "VLAN tag set";
          ovn-nbctl --columns=name,tag find logical_switch_port type=localnet | grep tenant'
      ignore_errors: true

  tags: ['vrf-assign']
