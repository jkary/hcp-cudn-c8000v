---
# Teardown: Remove CUDN resources and reset clusters between labs.
#
# Discovers and deletes all lab resources dynamically rather than by name,
# waits for namespaces to fully terminate, and restarts ovnkube-node to
# clean up stale VRF devices and ip rules left behind by OVN.
#
# Run it with:
#   ap common/teardown.yaml
#
# Individual phases:
#   ap common/teardown.yaml -t hub
#   ap common/teardown.yaml -t spoke
#   ap common/teardown.yaml -t c8000v
#   ap common/teardown.yaml -t infra   # Remove c8000v-2 VM, second NICs, lab-network-253

- name: 'Teardown hub cluster CUDN resources'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Find all CUDN namespaces on hub'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        label_selectors:
          - "k8s.ovn.org/primary-user-defined-network"
      register: __hub_cudn_ns

    - name: 'Delete test pods in hub CUDN namespaces'
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Pod
        namespace: "{{ item.metadata.name }}"
        label_selectors:
          - "app=cudn-test"
      loop: "{{ __hub_cudn_ns.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      ignore_errors: true

    - name: 'Find all hub RouteAdvertisements'
      kubernetes.core.k8s_info:
        api_version: k8s.ovn.org/v1
        kind: RouteAdvertisements
      register: __hub_ra

    - name: 'Delete all hub RouteAdvertisements'
      kubernetes.core.k8s:
        state: absent
        api_version: k8s.ovn.org/v1
        kind: RouteAdvertisements
        name: "{{ item.metadata.name }}"
      loop: "{{ __hub_ra.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      ignore_errors: true

    - name: 'Find all hub FRRConfigurations'
      kubernetes.core.k8s_info:
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRConfiguration
        namespace: openshift-frr-k8s
      register: __hub_frr

    - name: 'Delete all hub FRRConfigurations'
      kubernetes.core.k8s:
        state: absent
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRConfiguration
        name: "{{ item.metadata.name }}"
        namespace: openshift-frr-k8s
      loop: "{{ __hub_frr.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      ignore_errors: true

    - name: 'Find all hub ClusterUserDefinedNetworks'
      kubernetes.core.k8s_info:
        api_version: k8s.ovn.org/v1
        kind: ClusterUserDefinedNetwork
      register: __hub_cudn

    - name: 'Delete all hub ClusterUserDefinedNetworks'
      kubernetes.core.k8s:
        state: absent
        api_version: k8s.ovn.org/v1
        kind: ClusterUserDefinedNetwork
        name: "{{ item.metadata.name }}"
      loop: "{{ __hub_cudn.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      ignore_errors: true

    - name: 'Find all hub NNCPs'
      kubernetes.core.k8s_info:
        api_version: nmstate.io/v1
        kind: NodeNetworkConfigurationPolicy
      register: __hub_nncp
      ignore_errors: true

    - name: 'Delete all hub NNCPs'
      kubernetes.core.k8s:
        state: absent
        api_version: nmstate.io/v1
        kind: NodeNetworkConfigurationPolicy
        name: "{{ item.metadata.name }}"
      loop: "{{ __hub_nncp.resources | default([]) }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      ignore_errors: true
      when: __hub_nncp is succeeded

    - name: 'Delete hub CUDN namespaces'
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ item.metadata.name }}"
      loop: "{{ __hub_cudn_ns.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      ignore_errors: true

    - name: 'Wait for hub CUDN namespaces to terminate'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        label_selectors:
          - "k8s.ovn.org/primary-user-defined-network"
      register: __hub_remaining_ns
      until: __hub_remaining_ns.resources | length == 0
      retries: 12
      delay: 10
      ignore_errors: true

    - name: 'Force-clear stuck hub namespace finalizers'
      ansible.builtin.shell: |
        oc get ns {{ item.metadata.name }} -o json | \
          python3 -c 'import json,sys; ns=json.load(sys.stdin); ns["spec"]["finalizers"]=[]; print(json.dumps(ns))' | \
          oc replace --raw "/api/v1/namespaces/{{ item.metadata.name }}/finalize" -f -
      loop: "{{ __hub_remaining_ns.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      when: __hub_remaining_ns.resources | length > 0
      ignore_errors: true

    - name: 'Confirm hub CUDN namespaces are gone'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        label_selectors:
          - "k8s.ovn.org/primary-user-defined-network"
      register: __hub_final_ns
      until: __hub_final_ns.resources | length == 0
      retries: 6
      delay: 5

    - name: 'Restart hub ovnkube-node to clean up stale VRF devices'
      ansible.builtin.command: oc rollout restart daemonset/ovnkube-node -n openshift-ovn-kubernetes

    - name: 'Wait for hub ovnkube-node rollout to complete'
      ansible.builtin.command: oc rollout status daemonset/ovnkube-node -n openshift-ovn-kubernetes --timeout=300s

  tags: ['hub']

