- name: 'Teardown c8000v BGP configuration'
  hosts: c8000v
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars_files:
    - manifest/vars.yaml

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_host: "{{ c8000v_host }}"
    ansible_user: "{{ c8000v_user }}"
    ansible_password: "{{ c8000v_password | default(omit) }}"
    ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"

  tasks:
    - name: 'Remove BGP configuration from c8000v'
      ansible.netcommon.cli_config:
        config: "no router bgp {{ c8000v_asn }}"

    - name: 'Verify BGP is removed'
      ansible.netcommon.cli_command:
        command: 'show ip bgp summary'
      register: __bgp_summary
      ignore_errors: true

    - name: 'Display BGP summary'
      ansible.builtin.debug:
        var: __bgp_summary.stdout_lines

  tags: ['c8000v']

- name: 'Teardown c8000v-2 BGP configuration'
  hosts: c8000v-2
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars_files:
    - manifest/vars.yaml

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_host: "{{ c8000v_2_host }}"
    ansible_user: "{{ c8000v_2_user }}"
    ansible_password: "{{ c8000v_2_password | default(omit) }}"
    ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"

  tasks:
    - name: 'Remove BGP configuration from c8000v-2'
      ansible.netcommon.cli_config:
        config: "no router bgp {{ c8000v_asn }}"

    - name: 'Verify BGP is removed on c8000v-2'
      ansible.netcommon.cli_command:
        command: 'show ip bgp summary'
      register: __bgp_summary_2
      ignore_errors: true

    - name: 'Display c8000v-2 BGP summary'
      ansible.builtin.debug:
        var: __bgp_summary_2.stdout_lines

  tags: ['c8000v']

- name: 'Teardown: Remove infrastructure (c8000v-2, second NICs, lab-network-253)'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - manifest/vars.yaml

  tasks:
    - name: 'Stop c8000v-2 VM'
      ansible.builtin.command: sudo virsh destroy c8000v-2
      ignore_errors: true

    - name: 'Undefine c8000v-2 VM'
      ansible.builtin.command: sudo virsh undefine c8000v-2
      ignore_errors: true

    - name: 'Remove c8000v-2 disk'
      ansible.builtin.file:
        path: "{{ c8000v_2_disk }}"
        state: absent
      become: true

    - name: 'Remove c8000v-2 day0 ISO'
      ansible.builtin.file:
        path: "{{ c8000v_2_day0_iso }}"
        state: absent
      become: true

    - name: 'Detach lab-network-253 NIC from cluster VMs'
      ansible.builtin.shell: |
        if sudo virsh domiflist {{ item.name }} | grep -q lab-network-253; then
          sudo virsh detach-interface --domain {{ item.name }} \
            --type network --mac {{ item.mac }} \
            --persistent --live
        else
          echo "Not attached"
        fi
      loop: "{{ cluster_vms_spine2 }}"
      loop_control:
        label: "{{ item.name }}"
      ignore_errors: true

    - name: 'Destroy lab-network-253'
      ansible.builtin.command: sudo virsh net-destroy lab-network-253
      ignore_errors: true

    - name: 'Undefine lab-network-253'
      ansible.builtin.command: sudo virsh net-undefine lab-network-253
      ignore_errors: true

  tags: ['infra']
