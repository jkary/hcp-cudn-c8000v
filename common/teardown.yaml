---
# Teardown: Remove CUDN resources and reset clusters between labs.
#
# Run it with:
#   ap common/teardown.yaml
#
# Individual phases:
#   ap common/teardown.yaml -t hub
#   ap common/teardown.yaml -t spoke
#   ap common/teardown.yaml -t c8000v
#   ap common/teardown.yaml -t infra   # Remove c8000v-2 VM, second NICs, lab-network-253

- name: 'Teardown hub cluster CUDN resources'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Delete test pods in hub CUDN namespaces'
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Pod
        namespace: "{{ item }}"
        label_selectors:
          - "app=cudn-test"
      loop:
        - cudn-hub-ns
      ignore_errors: true

    - name: 'Delete all hub RouteAdvertisements'
      kubernetes.core.k8s:
        state: absent
        api_version: k8s.ovn.org/v1
        kind: RouteAdvertisements
        name: "{{ item }}"
      loop:
        - hub-cudn-routes
        - tenant-a-routes
        - tenant-c-routes
      ignore_errors: true

    - name: 'Delete all hub FRRConfigurations'
      kubernetes.core.k8s:
        state: absent
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRConfiguration
        name: "{{ item }}"
        namespace: openshift-frr-k8s
      loop:
        - hub-bgp
        - tenant-a-bgp
        - tenant-c-bgp
      ignore_errors: true

    - name: 'Delete hub ClusterUserDefinedNetworks'
      kubernetes.core.k8s:
        state: absent
        api_version: k8s.ovn.org/v1
        kind: ClusterUserDefinedNetwork
        name: "{{ item }}"
      loop:
        - hub-network
        - tenant-a-network
        - tenant-c-network
      ignore_errors: true

    - name: 'Delete hub CUDN namespaces'
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ item }}"
      loop:
        - cudn-hub-ns
        - tenant-a-ns
        - tenant-c-ns
      ignore_errors: true

  tags: ['hub']

