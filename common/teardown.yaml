---
# Teardown: Remove CUDN resources and reset clusters between labs.
#
# Run it with:
#   ap common/teardown.yaml
#
# Individual phases:
#   ap common/teardown.yaml -t hub
#   ap common/teardown.yaml -t spoke
#   ap common/teardown.yaml -t c8000v

- name: 'Teardown hub cluster CUDN resources'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Delete test pods in hub CUDN namespaces'
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Pod
        namespace: "{{ item }}"
        label_selectors:
          - "app=cudn-test"
      loop:
        - cudn-hub-ns
      ignore_errors: true

    - name: 'Delete hub RouteAdvertisements'
      kubernetes.core.k8s:
        state: absent
        api_version: k8s.ovn.org/v1
        kind: RouteAdvertisements
        name: hub-cudn-routes
      ignore_errors: true

    - name: 'Delete hub FRRConfiguration'
      kubernetes.core.k8s:
        state: absent
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRConfiguration
        name: hub-bgp
        namespace: openshift-frr-k8s
      ignore_errors: true

    - name: 'Delete hub ClusterUserDefinedNetwork'
      kubernetes.core.k8s:
        state: absent
        api_version: k8s.ovn.org/v1
        kind: ClusterUserDefinedNetwork
        name: hub-network
      ignore_errors: true

    - name: 'Delete hub CUDN namespace'
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: cudn-hub-ns
      ignore_errors: true

  tags: ['hub']

- name: 'Teardown spoke cluster CUDN resources'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ spoke_kubeconfig }}"

  tasks:
    - name: 'Delete test pods in spoke CUDN namespaces'
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Pod
        namespace: "{{ item }}"
        label_selectors:
          - "app=cudn-test"
      loop:
        - cudn-spoke-ns
      ignore_errors: true

    - name: 'Delete spoke RouteAdvertisements'
      kubernetes.core.k8s:
        state: absent
        api_version: k8s.ovn.org/v1
        kind: RouteAdvertisements
        name: spoke-cudn-routes
      ignore_errors: true

    - name: 'Delete spoke FRRConfiguration'
      kubernetes.core.k8s:
        state: absent
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRConfiguration
        name: spoke-bgp
        namespace: openshift-frr-k8s
      ignore_errors: true

    - name: 'Delete spoke ClusterUserDefinedNetwork'
      kubernetes.core.k8s:
        state: absent
        api_version: k8s.ovn.org/v1
        kind: ClusterUserDefinedNetwork
        name: spoke-network
      ignore_errors: true

    - name: 'Delete spoke CUDN namespace'
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: cudn-spoke-ns
      ignore_errors: true

  tags: ['spoke']

- name: 'Teardown c8000v BGP configuration'
  hosts: c8000v
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars_files:
    - manifest/vars.yaml

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_host: "{{ c8000v_host }}"
    ansible_user: "{{ c8000v_user }}"
    ansible_password: "{{ c8000v_password | default(omit) }}"
    ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"

  tasks:
    - name: 'Remove BGP configuration from c8000v'
      ansible.netcommon.cli_config:
        config: "no router bgp {{ c8000v_asn }}"

    - name: 'Verify BGP is removed'
      ansible.netcommon.cli_command:
        command: 'show ip bgp summary'
      register: __bgp_summary
      ignore_errors: true

    - name: 'Display BGP summary'
      ansible.builtin.debug:
        var: __bgp_summary.stdout_lines

  tags: ['c8000v']
