---
# Lab 02 Verification: Capture iperf3 traffic flows across clusters.
#
# Prerequisites:
#   ansible-playbook lab01-cudn-bgp/verify.yaml  (deploys iperf3 test pods)
#   ansible-playbook lab02-flow-tracing/lab02.yaml (deploys capture pods)
#
# Run it with:
#   ansible-playbook lab02-flow-tracing/verify.yaml

- name: 'Capture iperf3 traffic flows'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  tasks:
    # --- Get CUDN IPs from test pod annotations ---
    - name: 'Get hub test pod info'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: hub-test
        namespace: cudn-hub-ns
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_test_pod

    - name: 'Get spoke test pod info'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: spoke-test
        namespace: cudn-spoke-ns
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_test_pod

    - name: 'Parse test pod CUDN IPs from annotations'
      ansible.builtin.set_fact:
        hub_test_ip: "{{ (__hub_test_pod.resources[0].metadata.annotations['k8s.ovn.org/pod-networks'] | from_json)['cudn-hub-ns/hub-network']['ip_address'] | regex_replace('/.*', '') }}"
        spoke_test_ip: "{{ (__spoke_test_pod.resources[0].metadata.annotations['k8s.ovn.org/pod-networks'] | from_json)['cudn-spoke-ns/spoke-network']['ip_address'] | regex_replace('/.*', '') }}"

    - name: 'Display CUDN IPs'
      ansible.builtin.debug:
        msg:
        - "Hub test pod:  {{ hub_test_ip }}"
        - "Spoke test pod: {{ spoke_test_ip }}"

    # --- Hub -> Spoke: iperf3 + tcpdump ---
    - name: 'Start iperf3 server on spoke'
      kubernetes.core.k8s_exec:
        namespace: cudn-spoke-ns
        pod: spoke-test
        command: "sh -c 'iperf3 -s -1 -D && echo iperf3 server started'"
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"

    - name: 'Hub -> Spoke: iperf3 + tcpdump capture'
      kubernetes.core.k8s_exec:
        namespace: cudn-hub-ns
        pod: hub-test
        command: >-
          sh -c 'iperf3 -c {{ spoke_test_ip }} -t 10 > /tmp/iperf3.log 2>&1 &
          IPERF_PID=$!;
          timeout 20 tcpdump -i ovn-udn1 -nn -c 50 tcp port 5201;
          wait $IPERF_PID 2>/dev/null; true'
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_capture
      ignore_errors: true

    - name: 'Collect hub -> spoke iperf3 results'
      kubernetes.core.k8s_exec:
        namespace: cudn-hub-ns
        pod: hub-test
        command: "cat /tmp/iperf3.log"
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_iperf3
      ignore_errors: true

    # --- Spoke -> Hub: iperf3 + tcpdump ---
    - name: 'Start iperf3 server on hub'
      kubernetes.core.k8s_exec:
        namespace: cudn-hub-ns
        pod: hub-test
        command: "sh -c 'iperf3 -s -1 -D && echo iperf3 server started'"
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"

    - name: 'Spoke -> Hub: iperf3 + tcpdump capture'
      kubernetes.core.k8s_exec:
        namespace: cudn-spoke-ns
        pod: spoke-test
        command: >-
          sh -c 'iperf3 -c {{ hub_test_ip }} -t 10 > /tmp/iperf3.log 2>&1 &
          IPERF_PID=$!;
          timeout 20 tcpdump -i ovn-udn1 -nn -c 50 tcp port 5201;
          wait $IPERF_PID 2>/dev/null; true'
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_capture
      ignore_errors: true

    - name: 'Collect spoke -> hub iperf3 results'
      kubernetes.core.k8s_exec:
        namespace: cudn-spoke-ns
        pod: spoke-test
        command: "cat /tmp/iperf3.log"
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_iperf3
      ignore_errors: true

    # --- Display results ---
    - name: 'Hub -> Spoke iperf3 throughput'
      ansible.builtin.debug:
        msg: "{{ __hub_iperf3.stdout_lines | default(['No iperf3 data']) }}"

    - name: 'Hub tcpdump - outbound iperf3 traffic (tcp/5201)'
      ansible.builtin.debug:
        msg: "{{ __hub_capture.stdout_lines | default(['No capture data']) }}"

    - name: 'Spoke -> Hub iperf3 throughput'
      ansible.builtin.debug:
        msg: "{{ __spoke_iperf3.stdout_lines | default(['No iperf3 data']) }}"

    - name: 'Spoke tcpdump - outbound iperf3 traffic (tcp/5201)'
      ansible.builtin.debug:
        msg: "{{ __spoke_capture.stdout_lines | default(['No capture data']) }}"

  tags: ['trace']

- name: 'c8000v routing perspective'
  hosts: c8000v
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_host: "{{ c8000v_host }}"
    ansible_user: "{{ c8000v_user }}"
    ansible_password: "{{ c8000v_password | default(omit) }}"
    ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"

  tasks:
    - name: 'Show c8000v BGP routes'
      ansible.netcommon.cli_command:
        command: 'show ip bgp'
      register: __bgp_routes

    - name: 'Show c8000v routing table for CUDN prefixes'
      ansible.netcommon.cli_command:
        command: 'show ip route bgp'
      register: __ip_routes

    - name: 'Show c8000v interface counters'
      ansible.netcommon.cli_command:
        command: 'show interfaces GigabitEthernet1 | include packets'
      register: __iface_counters

    - name: 'c8000v BGP routes'
      ansible.builtin.debug:
        var: __bgp_routes.stdout_lines

    - name: 'c8000v BGP routing table'
      ansible.builtin.debug:
        var: __ip_routes.stdout_lines

    - name: 'c8000v interface packet counters'
      ansible.builtin.debug:
        var: __iface_counters.stdout_lines

  tags: ['c8000v']
