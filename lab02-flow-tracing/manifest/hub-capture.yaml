---
# Capture pod on hub CUDN with NET_RAW for tshark/tcpdump
apiVersion: v1
kind: Pod
metadata:
  name: hub-capture
  namespace: cudn-hub-ns
  labels:
    app: cudn-capture
spec:
  containers:
  - name: capture
    image: quay.io/openshift/origin-network-tools:latest
    command: ["sleep", "infinity"]
    securityContext:
      capabilities:
        add: ["NET_RAW"]
