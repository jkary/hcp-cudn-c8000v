---
# Test pod on hub CUDN
apiVersion: v1
kind: Pod
metadata:
  name: hub-test
  namespace: cudn-hub-ns
  labels:
    app: cudn-test
spec:
  containers:
  - name: test
    image: quay.io/openshift/origin-network-tools:latest
    command: ["sleep", "infinity"]
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
---
# Test pod on spoke CUDN
apiVersion: v1
kind: Pod
metadata:
  name: spoke-test
  namespace: cudn-spoke-ns
  labels:
    app: cudn-test
spec:
  containers:
  - name: test
    image: quay.io/openshift/origin-network-tools:latest
    command: ["sleep", "infinity"]
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
