---
# Test pod on hub CUDN (iperf3 for throughput testing)
apiVersion: v1
kind: Pod
metadata:
  name: hub-test
  namespace: cudn-hub-ns
  labels:
    app: cudn-test
spec:
  containers:
  - name: test
    image: docker.io/nicolaka/netshoot:latest
    command: ["/bin/sh", "-c", "sleep infinity"]
    securityContext:
      capabilities:
        add: ["NET_RAW"]
---
# Test pod on spoke CUDN (iperf3 for throughput testing)
apiVersion: v1
kind: Pod
metadata:
  name: spoke-test
  namespace: cudn-spoke-ns
  labels:
    app: cudn-test
spec:
  containers:
  - name: test
    image: docker.io/nicolaka/netshoot:latest
    command: ["/bin/sh", "-c", "sleep infinity"]
    securityContext:
      capabilities:
        add: ["NET_RAW"]
