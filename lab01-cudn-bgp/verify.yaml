---
# Lab 01 Verification: Control-plane checks and cross-cluster ping.
#
# Prerequisites:
#   ansible-playbook common/setup.yaml
#   ansible-playbook lab01-cudn-bgp/lab01.yaml
#
# Run it with:
#   ansible-playbook lab01-cudn-bgp/verify.yaml

- name: 'Verify c8000v BGP state'
  hosts: c8000v
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_host: "{{ c8000v_host }}"
    ansible_user: "{{ c8000v_user }}"
    ansible_password: "{{ c8000v_password | default(omit) }}"
    ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"

  tasks:
    - name: 'Check c8000v BGP summary'
      ansible.netcommon.cli_command:
        command: 'show ip bgp summary'
      register: __verify_bgp_summary
      ignore_errors: true

    - name: 'Display c8000v BGP summary'
      ansible.builtin.debug:
        var: __verify_bgp_summary.stdout_lines
      when: __verify_bgp_summary is succeeded

    - name: 'Check c8000v BGP routes'
      ansible.netcommon.cli_command:
        command: 'show ip bgp'
      register: __verify_bgp_routes
      ignore_errors: true

    - name: 'Display c8000v BGP routes'
      ansible.builtin.debug:
        var: __verify_bgp_routes.stdout_lines
      when: __verify_bgp_routes is succeeded

  tags: ['c8000v']

- name: 'Verify hub BGP sessions'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Get hub FRR pods'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: openshift-frr-k8s
        label_selectors:
          - "app=frr-k8s"
      register: __hub_frr_pods

    - name: 'Show hub BGP summary from FRR'
      kubernetes.core.k8s_exec:
        namespace: openshift-frr-k8s
        pod: "{{ item.metadata.name }}"
        container: frr
        command: "vtysh -c 'show bgp summary'"
      loop: "{{ __hub_frr_pods.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      register: __hub_bgp_summaries

    - name: 'Hub BGP sessions'
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ __hub_bgp_summaries.results }}"
      loop_control:
        label: "{{ item.item.metadata.name }}"

    - name: 'Show hub FRR BGP routes'
      kubernetes.core.k8s_exec:
        namespace: openshift-frr-k8s
        pod: "{{ __hub_frr_pods.resources[0].metadata.name }}"
        container: frr
        command: "vtysh -c 'show bgp ipv4 unicast'"
      register: __hub_frr_routes

    - name: 'Hub FRR BGP routes (expect spoke 10.200.x.x prefixes)'
      ansible.builtin.debug:
        msg: "{{ __hub_frr_routes.stdout_lines }}"

  tags: ['hub']

- name: 'Verify spoke BGP sessions'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ spoke_kubeconfig }}"

  tasks:
    - name: 'Get spoke FRR pods'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: openshift-frr-k8s
        label_selectors:
          - "app=frr-k8s"
      register: __spoke_frr_pods

    - name: 'Show spoke BGP summary from FRR'
      kubernetes.core.k8s_exec:
        namespace: openshift-frr-k8s
        pod: "{{ item.metadata.name }}"
        container: frr
        command: "vtysh -c 'show bgp summary'"
      loop: "{{ __spoke_frr_pods.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      register: __spoke_bgp_summaries

    - name: 'Spoke BGP sessions'
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ __spoke_bgp_summaries.results }}"
      loop_control:
        label: "{{ item.item.metadata.name }}"

    - name: 'Show spoke FRR BGP routes'
      kubernetes.core.k8s_exec:
        namespace: openshift-frr-k8s
        pod: "{{ __spoke_frr_pods.resources[0].metadata.name }}"
        container: frr
        command: "vtysh -c 'show bgp ipv4 unicast'"
      register: __spoke_frr_routes

    - name: 'Spoke FRR BGP routes (expect hub 10.100.x.x prefixes)'
      ansible.builtin.debug:
        msg: "{{ __spoke_frr_routes.stdout_lines }}"

  tags: ['spoke']

- name: 'Deploy test pods and verify connectivity'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  tasks:
    # --- Hub test pod ---
    - name: 'Label hub namespace for privileged pod security'
      kubernetes.core.k8s:
        state: patched
        api_version: v1
        kind: Namespace
        name: cudn-hub-ns
        definition:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: privileged
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      tags: ['hub']

    - name: 'Deploy test pod on hub CUDN'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: hub-test
            namespace: cudn-hub-ns
            labels:
              app: cudn-test
          spec:
            containers:
            - name: test
              image: docker.io/nicolaka/netshoot:latest
              command: ["/bin/sh", "-c", "sleep infinity"]
              securityContext:
                capabilities:
                  add: ["NET_RAW"]
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      tags: ['hub']

    - name: 'Wait for hub test pod to be running'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: hub-test
        namespace: cudn-hub-ns
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_pod
      until: >
        __hub_pod.resources | length > 0 and
        __hub_pod.resources[0].status.phase == 'Running'
      retries: 30
      delay: 10
      tags: ['hub']

    - name: 'Get hub test pod CUDN IP from annotation'
      ansible.builtin.set_fact:
        hub_pod_ip: "{{ (__hub_pod.resources[0].metadata.annotations['k8s.ovn.org/pod-networks'] | from_json)['cudn-hub-ns/hub-network']['ip_address'] | regex_replace('/.*', '') }}"
      tags: ['hub']

    - name: 'Display hub test pod CUDN IP'
      ansible.builtin.debug:
        msg: "Hub test pod CUDN IP: {{ hub_pod_ip }}"
      tags: ['hub']

    # --- Spoke test pod ---
    - name: 'Label spoke namespace for privileged pod security'
      kubernetes.core.k8s:
        state: patched
        api_version: v1
        kind: Namespace
        name: cudn-spoke-ns
        definition:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: privileged
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      tags: ['spoke']

    - name: 'Deploy test pod on spoke CUDN'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: spoke-test
            namespace: cudn-spoke-ns
            labels:
              app: cudn-test
          spec:
            containers:
            - name: test
              image: docker.io/nicolaka/netshoot:latest
              command: ["/bin/sh", "-c", "sleep infinity"]
              securityContext:
                capabilities:
                  add: ["NET_RAW"]
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      tags: ['spoke']

    - name: 'Wait for spoke test pod to be running'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: spoke-test
        namespace: cudn-spoke-ns
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_pod
      until: >
        __spoke_pod.resources | length > 0 and
        __spoke_pod.resources[0].status.phase == 'Running'
      retries: 30
      delay: 10
      tags: ['spoke']

    - name: 'Get spoke test pod CUDN IP from annotation'
      ansible.builtin.set_fact:
        spoke_pod_ip: "{{ (__spoke_pod.resources[0].metadata.annotations['k8s.ovn.org/pod-networks'] | from_json)['cudn-spoke-ns/spoke-network']['ip_address'] | regex_replace('/.*', '') }}"
      tags: ['spoke']

    - name: 'Display spoke test pod CUDN IP'
      ansible.builtin.debug:
        msg: "Spoke test pod CUDN IP: {{ spoke_pod_ip }}"
      tags: ['spoke']

    # --- Cross-cluster ping tests ---
    - name: 'Ping hub -> spoke'
      kubernetes.core.k8s_exec:
        namespace: cudn-hub-ns
        pod: hub-test
        command: "ping -c 5 -W 2 {{ spoke_pod_ip }}"
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_to_spoke_ping
      ignore_errors: true
      tags: ['ping']

    - name: 'Display hub -> spoke ping result'
      ansible.builtin.debug:
        msg: "{{ __hub_to_spoke_ping.stdout_lines | default(__hub_to_spoke_ping.stderr_lines) }}"
      tags: ['ping']

    - name: 'Ping spoke -> hub'
      kubernetes.core.k8s_exec:
        namespace: cudn-spoke-ns
        pod: spoke-test
        command: "ping -c 5 -W 2 {{ hub_pod_ip }}"
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_to_hub_ping
      ignore_errors: true
      tags: ['ping']

    - name: 'Display spoke -> hub ping result'
      ansible.builtin.debug:
        msg: "{{ __spoke_to_hub_ping.stdout_lines | default(__spoke_to_hub_ping.stderr_lines) }}"
      tags: ['ping']

    - name: 'Summary'
      ansible.builtin.debug:
        msg:
        - "Hub test pod CUDN IP: {{ hub_pod_ip }}"
        - "Spoke test pod CUDN IP: {{ spoke_pod_ip }}"
        - "Hub -> Spoke ping: {{ 'PASS' if __hub_to_spoke_ping is succeeded else 'FAIL' }}"
        - "Spoke -> Hub ping: {{ 'PASS' if __spoke_to_hub_ping is succeeded else 'FAIL' }}"
      tags: ['ping']
