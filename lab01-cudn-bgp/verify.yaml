---
# Lab 01 Verification: Deploy test pods and check cross-cluster connectivity.
#
# Prerequisites:
#   ap common/setup.yaml
#   ap lab01-cudn-bgp/lab01.yaml
#
# Run it with:
#   ap lab01-cudn-bgp/verify.yaml

- name: 'Verify c8000v BGP state'
  hosts: c8000v
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_host: "{{ c8000v_host }}"
    ansible_user: "{{ c8000v_user }}"
    ansible_password: "{{ c8000v_password | default(omit) }}"
    ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"

  tasks:
    - name: 'Check c8000v BGP summary'
      ansible.netcommon.cli_command:
        command: 'show ip bgp summary'
      register: __verify_bgp_summary
      ignore_errors: true

    - name: 'Display c8000v BGP summary'
      ansible.builtin.debug:
        var: __verify_bgp_summary.stdout_lines
      when: __verify_bgp_summary is succeeded

    - name: 'Check c8000v BGP routes'
      ansible.netcommon.cli_command:
        command: 'show ip bgp'
      register: __verify_bgp_routes
      ignore_errors: true

    - name: 'Display c8000v BGP routes'
      ansible.builtin.debug:
        var: __verify_bgp_routes.stdout_lines
      when: __verify_bgp_routes is succeeded

  tags: ['c8000v']

- name: 'Verify clusters and test connectivity'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  tasks:
    # --- Hub verification ---
    - name: 'Check hub BGP session states'
      kubernetes.core.k8s_info:
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRNodeState
        namespace: openshift-frr-k8s
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_sessions
      tags: ['hub']

    - name: 'Display hub BGP session states'
      ansible.builtin.debug:
        var: __hub_sessions.resources
      tags: ['hub']

    - name: 'Label hub namespace for privileged pod security'
      kubernetes.core.k8s:
        state: patched
        api_version: v1
        kind: Namespace
        name: cudn-hub-ns
        definition:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: privileged
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      tags: ['hub']

    - name: 'Deploy test pod on hub CUDN'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: hub-test
            namespace: cudn-hub-ns
            labels:
              app: cudn-test
          spec:
            containers:
            - name: test
              image: docker.io/nicolaka/netshoot:latest
              command: ["/bin/sh", "-c", "sleep infinity"]
              securityContext:
                capabilities:
                  add: ["NET_RAW"]
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      tags: ['hub']

    - name: 'Wait for hub test pod to be running'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: hub-test
        namespace: cudn-hub-ns
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_pod
      until: >
        __hub_pod.resources | length > 0 and
        __hub_pod.resources[0].status.phase == 'Running'
      retries: 30
      delay: 10
      tags: ['hub']

    - name: 'Get hub test pod CUDN IP from annotation'
      ansible.builtin.set_fact:
        hub_pod_ip: "{{ (__hub_pod.resources[0].metadata.annotations['k8s.ovn.org/pod-networks'] | from_json)['cudn-hub-ns/hub-network']['ip_address'] | regex_replace('/.*', '') }}"
      tags: ['hub']

    - name: 'Display hub test pod CUDN IP'
      ansible.builtin.debug:
        msg: "Hub test pod CUDN IP: {{ hub_pod_ip }}"
      tags: ['hub']

    # --- Spoke verification ---
    - name: 'Check spoke BGP session states'
      kubernetes.core.k8s_info:
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRNodeState
        namespace: openshift-frr-k8s
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_sessions
      tags: ['spoke']

    - name: 'Display spoke BGP session states'
      ansible.builtin.debug:
        var: __spoke_sessions.resources
      tags: ['spoke']

    - name: 'Label spoke namespace for privileged pod security'
      kubernetes.core.k8s:
        state: patched
        api_version: v1
        kind: Namespace
        name: cudn-spoke-ns
        definition:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: privileged
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      tags: ['spoke']

    - name: 'Deploy test pod on spoke CUDN'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: spoke-test
            namespace: cudn-spoke-ns
            labels:
              app: cudn-test
          spec:
            containers:
            - name: test
              image: docker.io/nicolaka/netshoot:latest
              command: ["/bin/sh", "-c", "sleep infinity"]
              securityContext:
                capabilities:
                  add: ["NET_RAW"]
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      tags: ['spoke']

    - name: 'Wait for spoke test pod to be running'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: spoke-test
        namespace: cudn-spoke-ns
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_pod
      until: >
        __spoke_pod.resources | length > 0 and
        __spoke_pod.resources[0].status.phase == 'Running'
      retries: 30
      delay: 10
      tags: ['spoke']

    - name: 'Get spoke test pod CUDN IP from annotation'
      ansible.builtin.set_fact:
        spoke_pod_ip: "{{ (__spoke_pod.resources[0].metadata.annotations['k8s.ovn.org/pod-networks'] | from_json)['cudn-spoke-ns/spoke-network']['ip_address'] | regex_replace('/.*', '') }}"
      tags: ['spoke']

    - name: 'Display spoke test pod CUDN IP'
      ansible.builtin.debug:
        msg: "Spoke test pod CUDN IP: {{ spoke_pod_ip }}"
      tags: ['spoke']

    # --- Cross-cluster iperf3 tests ---
    - name: 'Start iperf3 server on spoke pod'
      kubernetes.core.k8s_exec:
        namespace: cudn-spoke-ns
        pod: spoke-test
        command: "sh -c 'iperf3 -s -1 -D && echo iperf3 server started on port 5201'"
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      tags: ['iperf3']

    - name: 'iperf3 hub -> spoke (10s throughput test)'
      kubernetes.core.k8s_exec:
        namespace: cudn-hub-ns
        pod: hub-test
        command: "iperf3 -c {{ spoke_pod_ip }} -t 10"
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_to_spoke_iperf3
      ignore_errors: true
      tags: ['iperf3']

    - name: 'Display hub -> spoke iperf3 result'
      ansible.builtin.debug:
        msg: "{{ __hub_to_spoke_iperf3.stdout_lines | default(__hub_to_spoke_iperf3.stderr_lines) }}"
      tags: ['iperf3']

    - name: 'Start iperf3 server on hub pod'
      kubernetes.core.k8s_exec:
        namespace: cudn-hub-ns
        pod: hub-test
        command: "sh -c 'iperf3 -s -1 -D && echo iperf3 server started on port 5201'"
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      tags: ['iperf3']

    - name: 'iperf3 spoke -> hub (10s throughput test)'
      kubernetes.core.k8s_exec:
        namespace: cudn-spoke-ns
        pod: spoke-test
        command: "iperf3 -c {{ hub_pod_ip }} -t 10"
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_to_hub_iperf3
      ignore_errors: true
      tags: ['iperf3']

    - name: 'Display spoke -> hub iperf3 result'
      ansible.builtin.debug:
        msg: "{{ __spoke_to_hub_iperf3.stdout_lines | default(__spoke_to_hub_iperf3.stderr_lines) }}"
      tags: ['iperf3']

    - name: 'Summary'
      ansible.builtin.debug:
        msg:
        - "Hub test pod CUDN IP: {{ hub_pod_ip }}"
        - "Spoke test pod CUDN IP: {{ spoke_pod_ip }}"
        - "Hub -> Spoke iperf3: {{ 'SUCCESS' if __hub_to_spoke_iperf3 is succeeded else 'FAILED' }}"
        - "Spoke -> Hub iperf3: {{ 'SUCCESS' if __spoke_to_hub_iperf3 is succeeded else 'FAILED' }}"
      tags: ['iperf3']
