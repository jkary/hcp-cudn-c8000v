---
# BGP-Routed CUDNs Between Hub and Spoke Clusters via c8000v
#
# Prerequisites:
#   - Hub and spoke clusters deployed via labs/hcp/deploy.yaml
#   - c8000v router at 172.16.252.50 configured with BGP (see manifest/c8000v-bgp.cfg)
#
# Run it with:
#   ap labs/hcp/bgp-cudn.yaml
#
# Run individual phases:
#   ap labs/hcp/bgp-cudn.yaml -t hub
#   ap labs/hcp/bgp-cudn.yaml -t spoke
#   ap labs/hcp/bgp-cudn.yaml -t verify

- name: 'Phase 1: Configure c8000v BGP'
  hosts: lab
  gather_facts: false

  vars:
    c8000v_host: '172.16.252.50'
    c8000v_user: 'admin'

  tasks:
    - name: 'Push BGP configuration to c8000v'
      ansible.netcommon.cli_config:
        config: "{{ lookup('file', playbook_dir + '/manifest/c8000v-bgp.cfg') }}"
      vars:
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        ansible_host: "{{ c8000v_host }}"
        ansible_user: "{{ c8000v_user }}"
        ansible_password: "{{ c8000v_password | default(omit) }}"
        ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"
      tags: ['c8000v']

    - name: 'Verify BGP is configured on c8000v'
      ansible.netcommon.cli_command:
        command: 'show ip bgp summary'
      vars:
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        ansible_host: "{{ c8000v_host }}"
        ansible_user: "{{ c8000v_user }}"
        ansible_password: "{{ c8000v_password | default(omit) }}"
        ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"
      register: __bgp_summary
      tags: ['c8000v']

    - name: 'Display BGP summary'
      ansible.builtin.debug:
        var: __bgp_summary.stdout_lines
      tags: ['c8000v']

  tags: ['c8000v']

- name: 'Phase 2: Hub cluster - Enable route advertisements and create CUDN'
  hosts: lab
  gather_facts: false

  vars:
    lab_name: 'hcp'
    lab_path: '/home/jkary/labs'
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "/home/jkary/labs/{{ lab_name }}/deploy/auth/kubeconfig"

  tasks:
    - name: 'Patch Network operator to enable FRR and route advertisements'
      kubernetes.core.k8s:
        state: patched
        api_version: operator.openshift.io/v1
        kind: Network
        name: cluster
        definition:
          spec:
            additionalRoutingCapabilities:
              providers:
              - FRR
            defaultNetwork:
              ovnKubernetesConfig:
                routeAdvertisements: Enabled

    - name: 'Wait for network operator to stabilize'
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: ClusterOperator
        name: network
      register: __network_co
      until: >
        __network_co.resources[0].status.conditions |
        selectattr('type', 'equalto', 'Available') |
        selectattr('status', 'equalto', 'True') |
        list | length > 0
      retries: 60
      delay: 10

    - name: 'Wait for FRR-K8s pods to be ready'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: openshift-frr-k8s
        label_selectors:
          - "app=frr-k8s"
      register: __frr_pods
      until: >
        __frr_pods.resources | length > 0 and
        __frr_pods.resources |
        selectattr('status.phase', 'equalto', 'Running') |
        list | length == __frr_pods.resources | length
      retries: 60
      delay: 10

    - name: 'Apply hub CUDN manifests'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/hub-cudn.yaml"
      register: __hub_cudn
      until: __hub_cudn is not failed
      retries: 5
      delay: 10

    - name: 'Wait for CUDN to be ready'
      kubernetes.core.k8s_info:
        api_version: k8s.ovn.org/v1
        kind: ClusterUserDefinedNetwork
        name: hub-network
      register: __hub_cudn_status
      until: >
        __hub_cudn_status.resources | length > 0
      retries: 30
      delay: 10

    - name: 'Apply hub BGP peering configuration'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/hub-bgp.yaml"
      register: __hub_bgp
      until: __hub_bgp is not failed
      retries: 5
      delay: 10

    - name: 'Wait for BGP sessions to establish'
      kubernetes.core.k8s_info:
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRNodeState
        namespace: openshift-frr-k8s
      register: __hub_bgp_state
      until: __hub_bgp_state.resources | length > 0
      retries: 30
      delay: 10
      ignore_errors: true

    - name: 'Display hub BGP state'
      ansible.builtin.debug:
        var: __hub_bgp_state.resources
      when: __hub_bgp_state is defined

  tags: ['hub']

- name: 'Phase 3: Spoke cluster - Enable FRR and route advertisements'
  hosts: lab
  gather_facts: false

  vars:
    lab_name: 'hcp'
    lab_path: '/home/jkary/labs'

  environment:
    KUBECONFIG: "/home/jkary/labs/{{ lab_name }}/deploy/auth/kubeconfig"

  tasks:
    - name: 'Try patching HostedCluster to enable FRR on spoke'
      kubernetes.core.k8s:
        state: patched
        api_version: hypershift.openshift.io/v1beta1
        kind: HostedCluster
        name: 'spoke'
        namespace: 'spoke'
        definition:
          spec:
            networking:
              additionalRoutingCapabilities:
                providers:
                - FRR
      register: __hc_patch
      ignore_errors: true

    - name: 'Display HostedCluster patch result'
      ansible.builtin.debug:
        msg: >-
          HostedCluster patch {{ 'succeeded' if __hc_patch is succeeded else 'failed' }}.
          {{ 'Will patch spoke Network operator directly.' if __hc_patch is failed else '' }}

  tags: ['spoke']

- name: 'Phase 4: Spoke cluster - Configure CUDN and BGP (via spoke kubeconfig)'
  hosts: lab
  gather_facts: false

  vars:
    lab_name: 'hcp'
    lab_path: '/home/jkary/labs'
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "/home/jkary/labs/{{ lab_name }}/spoke/auth/kubeconfig"

  tasks:
    - name: 'Patch spoke Network operator to enable FRR and route advertisements'
      kubernetes.core.k8s:
        state: patched
        api_version: operator.openshift.io/v1
        kind: Network
        name: cluster
        definition:
          spec:
            additionalRoutingCapabilities:
              providers:
              - FRR
            defaultNetwork:
              ovnKubernetesConfig:
                routeAdvertisements: Enabled
      register: __spoke_network_patch
      until: __spoke_network_patch is not failed
      retries: 5
      delay: 10

    - name: 'Wait for spoke network operator to stabilize'
      kubernetes.core.k8s_info:
        api_version: config.openshift.io/v1
        kind: ClusterOperator
        name: network
      register: __spoke_network_co
      until: >
        __spoke_network_co.resources[0].status.conditions |
        selectattr('type', 'equalto', 'Available') |
        selectattr('status', 'equalto', 'True') |
        list | length > 0
      retries: 60
      delay: 10

    - name: 'Wait for FRR-K8s pods on spoke'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: openshift-frr-k8s
        label_selectors:
          - "app=frr-k8s"
      register: __spoke_frr_pods
      until: >
        __spoke_frr_pods.resources | length > 0 and
        __spoke_frr_pods.resources |
        selectattr('status.phase', 'equalto', 'Running') |
        list | length == __spoke_frr_pods.resources | length
      retries: 60
      delay: 10

    - name: 'Apply spoke CUDN manifests'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/spoke-cudn.yaml"
      register: __spoke_cudn
      until: __spoke_cudn is not failed
      retries: 5
      delay: 10

    - name: 'Wait for spoke CUDN to be ready'
      kubernetes.core.k8s_info:
        api_version: k8s.ovn.org/v1
        kind: ClusterUserDefinedNetwork
        name: spoke-network
      register: __spoke_cudn_status
      until: >
        __spoke_cudn_status.resources | length > 0
      retries: 30
      delay: 10

    - name: 'Apply spoke BGP peering configuration'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/spoke-bgp.yaml"
      register: __spoke_bgp
      until: __spoke_bgp is not failed
      retries: 5
      delay: 10

    - name: 'Wait for spoke BGP sessions'
      kubernetes.core.k8s_info:
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRNodeState
        namespace: openshift-frr-k8s
      register: __spoke_bgp_state
      until: __spoke_bgp_state.resources | length > 0
      retries: 30
      delay: 10
      ignore_errors: true

    - name: 'Display spoke BGP state'
      ansible.builtin.debug:
        var: __spoke_bgp_state.resources
      when: __spoke_bgp_state is defined

  tags: ['spoke']

- name: 'Phase 5: Verification - Deploy test pods and check connectivity'
  hosts: lab
  gather_facts: false

  vars:
    lab_name: 'hcp'
    lab_path: '/home/jkary/labs'
    lab_local_path: "{{ playbook_dir }}"
    hub_kubeconfig: "/home/jkary/labs/hcp/deploy/auth/kubeconfig"
    spoke_kubeconfig: "/home/jkary/labs/hcp/spoke/auth/kubeconfig"

  tasks:
    # --- c8000v verification ---
    - name: 'Check c8000v BGP summary'
      ansible.netcommon.cli_command:
        command: 'show ip bgp summary'
      vars:
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        ansible_host: '172.16.252.50'
        ansible_user: 'admin'
        ansible_password: "{{ c8000v_password | default(omit) }}"
        ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"
      register: __verify_bgp_summary
      ignore_errors: true

    - name: 'Display c8000v BGP summary'
      ansible.builtin.debug:
        var: __verify_bgp_summary.stdout_lines
      when: __verify_bgp_summary is succeeded

    - name: 'Check c8000v BGP routes'
      ansible.netcommon.cli_command:
        command: 'show ip bgp'
      vars:
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        ansible_host: '172.16.252.50'
        ansible_user: 'admin'
        ansible_password: "{{ c8000v_password | default(omit) }}"
        ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"
      register: __verify_bgp_routes
      ignore_errors: true

    - name: 'Display c8000v BGP routes'
      ansible.builtin.debug:
        var: __verify_bgp_routes.stdout_lines
      when: __verify_bgp_routes is succeeded

    # --- Hub verification ---
    - name: 'Check hub BGP session states'
      kubernetes.core.k8s_info:
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRNodeState
        namespace: openshift-frr-k8s
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_sessions

    - name: 'Display hub BGP session states'
      ansible.builtin.debug:
        var: __hub_sessions.resources

    - name: 'Deploy test pod on hub CUDN'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: hub-test
            namespace: cudn-hub-ns
            labels:
              app: cudn-test
          spec:
            containers:
            - name: test
              image: quay.io/openshift/origin-network-tools:latest
              command: ["sleep", "infinity"]
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"

    - name: 'Wait for hub test pod to be running'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: hub-test
        namespace: cudn-hub-ns
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_pod
      until: >
        __hub_pod.resources | length > 0 and
        __hub_pod.resources[0].status.phase == 'Running'
      retries: 30
      delay: 10

    - name: 'Get hub test pod IP'
      ansible.builtin.set_fact:
        hub_pod_ip: "{{ __hub_pod.resources[0].status.podIP }}"

    - name: 'Display hub test pod IP'
      ansible.builtin.debug:
        msg: "Hub test pod IP: {{ hub_pod_ip }}"

    # --- Spoke verification ---
    - name: 'Check spoke BGP session states'
      kubernetes.core.k8s_info:
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRNodeState
        namespace: openshift-frr-k8s
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_sessions

    - name: 'Display spoke BGP session states'
      ansible.builtin.debug:
        var: __spoke_sessions.resources

    - name: 'Deploy test pod on spoke CUDN'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: spoke-test
            namespace: cudn-spoke-ns
            labels:
              app: cudn-test
          spec:
            containers:
            - name: test
              image: quay.io/openshift/origin-network-tools:latest
              command: ["sleep", "infinity"]
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"

    - name: 'Wait for spoke test pod to be running'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: spoke-test
        namespace: cudn-spoke-ns
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_pod
      until: >
        __spoke_pod.resources | length > 0 and
        __spoke_pod.resources[0].status.phase == 'Running'
      retries: 30
      delay: 10

    - name: 'Get spoke test pod IP'
      ansible.builtin.set_fact:
        spoke_pod_ip: "{{ __spoke_pod.resources[0].status.podIP }}"

    - name: 'Display spoke test pod IP'
      ansible.builtin.debug:
        msg: "Spoke test pod IP: {{ spoke_pod_ip }}"

    # --- Cross-cluster ping tests ---
    - name: 'Ping spoke pod from hub pod'
      kubernetes.core.k8s_exec:
        namespace: cudn-hub-ns
        pod: hub-test
        command: "ping -c 3 -W 5 {{ spoke_pod_ip }}"
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_to_spoke_ping
      ignore_errors: true

    - name: 'Display hub-to-spoke ping result'
      ansible.builtin.debug:
        msg: "{{ __hub_to_spoke_ping.stdout_lines | default(__hub_to_spoke_ping.stderr_lines) }}"

    - name: 'Ping hub pod from spoke pod'
      kubernetes.core.k8s_exec:
        namespace: cudn-spoke-ns
        pod: spoke-test
        command: "ping -c 3 -W 5 {{ hub_pod_ip }}"
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_to_hub_ping
      ignore_errors: true

    - name: 'Display spoke-to-hub ping result'
      ansible.builtin.debug:
        msg: "{{ __spoke_to_hub_ping.stdout_lines | default(__spoke_to_hub_ping.stderr_lines) }}"

    - name: 'Summary'
      ansible.builtin.debug:
        msg:
        - "Hub test pod: {{ hub_pod_ip }}"
        - "Spoke test pod: {{ spoke_pod_ip }}"
        - "Hub -> Spoke ping: {{ 'SUCCESS' if __hub_to_spoke_ping is succeeded else 'FAILED' }}"
        - "Spoke -> Hub ping: {{ 'SUCCESS' if __spoke_to_hub_ping is succeeded else 'FAILED' }}"

  tags: ['verify']
