---
# VLAN sub-interfaces on second NIC (spine2/ens1) for hub nodes.
# Tenant A: VLAN 100 on 172.16.101.0/24
# Tenant C: VLAN 300 on 172.16.151.0/24
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: spine2-vlan-master-1
spec:
  nodeSelector:
    kubernetes.io/hostname: hcp-master-1
  desiredState:
    interfaces:
    - name: ens1.100
      type: vlan
      state: up
      vlan:
        base-iface: ens1
        id: 100
      ipv4:
        enabled: true
        dhcp: false
        address:
        - ip: 172.16.101.61
          prefix-length: 24
      ipv6:
        enabled: false
    - name: ens1.300
      type: vlan
      state: up
      vlan:
        base-iface: ens1
        id: 300
      ipv4:
        enabled: true
        dhcp: false
        address:
        - ip: 172.16.151.61
          prefix-length: 24
      ipv6:
        enabled: false
