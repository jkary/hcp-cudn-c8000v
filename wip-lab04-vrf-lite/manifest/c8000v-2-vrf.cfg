! c8000v-2 VRF lite configuration for multi-tenant isolation
! Mirrors c8000v-1 VRF config but on GigabitEthernet2 (lab-network-253)
! Uses separate subnets from c8000v-1: .101, .201, .151 instead of .100, .200, .150
!
! VRF definitions with route-target policies
vrf definition TENANT-A
 rd 64514:100
 address-family ipv4
  route-target export 64514:100
  route-target import 64514:100
  route-target import 64514:300
 exit-address-family
!
vrf definition TENANT-B
 rd 64514:200
 address-family ipv4
  route-target export 64514:200
  route-target import 64514:200
  route-target import 64514:300
 exit-address-family
!
vrf definition TENANT-C
 rd 64514:300
 address-family ipv4
  route-target export 64514:300
  route-target import 64514:300
  route-target import 64514:100
  route-target import 64514:200
 exit-address-family
!
! VLAN sub-interfaces on GigabitEthernet2 (lab-network-253 side)
interface GigabitEthernet2.100
 encapsulation dot1Q 100
 vrf forwarding TENANT-A
 ip address 172.16.101.50 255.255.255.0
 no shutdown
!
interface GigabitEthernet2.200
 encapsulation dot1Q 200
 vrf forwarding TENANT-B
 ip address 172.16.201.50 255.255.255.0
 no shutdown
!
interface GigabitEthernet2.300
 encapsulation dot1Q 300
 vrf forwarding TENANT-C
 ip address 172.16.151.50 255.255.255.0
 no shutdown
!
! BGP with per-VRF address-families + iBGP
router bgp 64514
 bgp router-id 172.16.253.50
 bgp log-neighbor-changes
 !
 ! iBGP peer: c8000v-1
 neighbor 172.16.252.50 remote-as 64514
 neighbor 172.16.252.50 description c8000v-1-ibgp
 neighbor 172.16.252.50 next-hop-self
 !
 address-family ipv4 unicast
  neighbor 172.16.252.50 activate
 exit-address-family
 !
 ! Tenant A neighbors (hub nodes over VLAN 100 on spine2, AS 64512)
 address-family ipv4 vrf TENANT-A
  neighbor 172.16.101.61 remote-as 64512
  neighbor 172.16.101.61 activate
  neighbor 172.16.101.61 description hub-master-0-spine2
  neighbor 172.16.101.62 remote-as 64512
  neighbor 172.16.101.62 activate
  neighbor 172.16.101.62 description hub-master-1-spine2
  neighbor 172.16.101.63 remote-as 64512
  neighbor 172.16.101.63 activate
  neighbor 172.16.101.63 description hub-master-2-spine2
 exit-address-family
 !
 ! Tenant B neighbors (spoke worker over VLAN 200 on spine2, AS 64513)
 address-family ipv4 vrf TENANT-B
  neighbor 172.16.201.64 remote-as 64513
  neighbor 172.16.201.64 activate
  neighbor 172.16.201.64 description spoke-worker-1-spine2
 exit-address-family
 !
 ! Tenant C neighbors (hub nodes over VLAN 300 on spine2, AS 64512 + allowas-in)
 address-family ipv4 vrf TENANT-C
  neighbor 172.16.151.61 remote-as 64512
  neighbor 172.16.151.61 activate
  neighbor 172.16.151.61 allowas-in
  neighbor 172.16.151.61 description hub-master-0-spine2
  neighbor 172.16.151.62 remote-as 64512
  neighbor 172.16.151.62 activate
  neighbor 172.16.151.62 allowas-in
  neighbor 172.16.151.62 description hub-master-1-spine2
  neighbor 172.16.151.63 remote-as 64512
  neighbor 172.16.151.63 activate
  neighbor 172.16.151.63 allowas-in
  neighbor 172.16.151.63 description hub-master-2-spine2
 exit-address-family
!
end
