---
# Lab 03 Verification: EgressIP and pod identity demonstration.
#
# Three phases:
#   Phase 1 - Default egress (node IP as source)
#   Phase 2 - EgressIP applied (172.16.252.70 as source)
#   Phase 3 - Cross-cluster identity (CUDN pod IP, EgressIP not applied)
#
# Prerequisites:
#   ansible-playbook common/setup.yaml
#   ansible-playbook lab03-egressip/lab03.yaml
#
# Run it with:
#   ansible-playbook lab03-egressip/verify.yaml

# === Setup: configure ICMP logging ACL on c8000v ===
- name: 'Setup: Configure ICMP logging on c8000v'
  hosts: c8000v
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_host: "{{ c8000v_host }}"
    ansible_user: "{{ c8000v_user }}"
    ansible_password: "{{ c8000v_password | default(omit) }}"
    ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"
    ansible_paramiko_look_for_keys: false

  tasks:
    - name: 'Configure ACL to log incoming ICMP packets'
      ansible.netcommon.cli_config:
        config: |
          ip access-list extended ICMP-LOG
           permit icmp any host {{ c8000v_host }} log
           permit ip any any
          !
          interface GigabitEthernet1
           ip access-group ICMP-LOG in
          !
          end

    - name: 'Clear the log buffer'
      ansible.netcommon.cli_command:
        command: 'clear logging'
        prompt: 'Clear logging buffer'
        answer: "\r"

# === Phase 1: Default egress behavior ===
- name: 'Phase 1: Default egress behavior (before EgressIP)'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Remove EgressIP if present from previous run'
      kubernetes.core.k8s:
        state: absent
        api_version: k8s.ovn.org/v1
        kind: EgressIP
        name: hub-egressip
      ignore_errors: true

    - name: 'Wait for EgressIP removal to take effect'
      ansible.builtin.pause:
        seconds: 5

    - name: 'Verify test pod is running'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: egress-test
        namespace: cudn-hub-ns
      register: __test_pod
      failed_when: >
        __test_pod.resources | length == 0 or
        __test_pod.resources[0].status.phase != 'Running'

    - name: 'Get test pod placement'
      ansible.builtin.set_fact:
        test_pod_node: "{{ __test_pod.resources[0].spec.nodeName }}"
        test_pod_host_ip: "{{ __test_pod.resources[0].status.hostIP }}"

    - name: 'Display pod placement'
      ansible.builtin.debug:
        msg:
          - "Test pod scheduled on: {{ test_pod_node }}"
          - "Node IP (expected default egress source): {{ test_pod_host_ip }}"

    - name: 'Default egress: ping c8000v from test pod'
      kubernetes.core.k8s_exec:
        namespace: cudn-hub-ns
        pod: egress-test
        command: "ping -c 3 -W 5 {{ c8000v_host }}"
      register: __default_ping
      ignore_errors: true

    - name: 'Display default egress ping'
      ansible.builtin.debug:
        msg: "{{ __default_ping.stdout_lines | default(__default_ping.stderr_lines) }}"

  tags: ['phase1']

- name: 'Phase 1b: Check source IP on c8000v (before EgressIP)'
  hosts: c8000v
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_host: "{{ c8000v_host }}"
    ansible_user: "{{ c8000v_user }}"
    ansible_password: "{{ c8000v_password | default(omit) }}"
    ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"
    ansible_paramiko_look_for_keys: false

  tasks:
    - name: 'Check log for ICMP source IPs (before EgressIP)'
      ansible.netcommon.cli_command:
        command: 'show logging | include ICMP'
      register: __log_before

    - name: 'ICMP source IPs seen by c8000v (before EgressIP)'
      ansible.builtin.debug:
        msg:
          - "Without EgressIP, source should be the node IP (172.16.252.6x):"
          - "{{ __log_before.stdout_lines | default(['No ICMP log entries']) }}"

    - name: 'Clear log for Phase 2'
      ansible.netcommon.cli_command:
        command: 'clear logging'
        prompt: 'Clear logging buffer'
        answer: "\r"

  tags: ['phase1']

# === Phase 2: Apply EgressIP ===
- name: 'Phase 2: Apply EgressIP and verify'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Apply EgressIP CR'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/hub-egressip.yaml"
      register: __egressip
      until: __egressip is not failed
      retries: 5
      delay: 10

    - name: 'Wait for EgressIP to be assigned'
      kubernetes.core.k8s_info:
        api_version: k8s.ovn.org/v1
        kind: EgressIP
        name: hub-egressip
      register: __egressip_status
      until: >
        __egressip_status.resources | length > 0 and
        __egressip_status.resources[0].get('status', {}).get('items', []) | length > 0
      retries: 30
      delay: 10
      ignore_errors: true

    - name: 'Display EgressIP assignment'
      ansible.builtin.debug:
        msg: "EgressIP assigned: {{ __egressip_status.resources[0].status }}"
      when: >
        __egressip_status is not failed and
        __egressip_status.resources | default([]) | length > 0 and
        __egressip_status.resources[0].status is defined

    - name: 'EgressIP egress: ping c8000v from test pod'
      kubernetes.core.k8s_exec:
        namespace: cudn-hub-ns
        pod: egress-test
        command: "ping -c 3 -W 5 {{ c8000v_host }}"
      register: __egressip_ping
      ignore_errors: true

    - name: 'Display EgressIP ping'
      ansible.builtin.debug:
        msg: "{{ __egressip_ping.stdout_lines | default(__egressip_ping.stderr_lines) }}"

  tags: ['phase2']

- name: 'Phase 2b: Check source IP on c8000v (after EgressIP)'
  hosts: c8000v
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_host: "{{ c8000v_host }}"
    ansible_user: "{{ c8000v_user }}"
    ansible_password: "{{ c8000v_password | default(omit) }}"
    ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"
    ansible_paramiko_look_for_keys: false

  tasks:
    - name: 'Check log for ICMP source IPs (after EgressIP)'
      ansible.netcommon.cli_command:
        command: 'show logging | include ICMP'
      register: __log_after

    - name: 'ICMP source IPs seen by c8000v (after EgressIP)'
      ansible.builtin.debug:
        msg:
          - "With EgressIP, source should be 172.16.252.70 (not a node IP):"
          - "{{ __log_after.stdout_lines | default(['No ICMP log entries']) }}"

  tags: ['phase2']

# === Phase 3: Cross-cluster identity ===
- name: 'Phase 3: Deploy spoke test pod'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ spoke_kubeconfig }}"

  tasks:
    - name: 'Verify spoke test pod is running'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: spoke-test
        namespace: cudn-spoke-ns
      register: __spoke_pod
      failed_when: >
        __spoke_pod.resources | length == 0 or
        __spoke_pod.resources[0].status.phase != 'Running'

    - name: 'Get spoke test pod CUDN IP from annotation'
      ansible.builtin.set_fact:
        spoke_pod_ip: "{{ (__spoke_pod.resources[0].metadata.annotations['k8s.ovn.org/pod-networks'] | from_json)['cudn-spoke-ns/spoke-network']['ip_address'] | regex_replace('/.*', '') }}"

    - name: 'Display spoke test pod CUDN IP'
      ansible.builtin.debug:
        msg: "Spoke test pod CUDN IP: {{ spoke_pod_ip }}"

  tags: ['phase3']

- name: 'Phase 3b: Cross-cluster identity proof via tcpdump'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  tasks:
    - name: 'Get hub test pod CUDN IP from annotation'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: egress-test
        namespace: cudn-hub-ns
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_pod

    - name: 'Extract hub pod CUDN IP'
      ansible.builtin.set_fact:
        hub_pod_cudn_ip: "{{ (__hub_pod.resources[0].metadata.annotations['k8s.ovn.org/pod-networks'] | from_json)['cudn-hub-ns/hub-network']['ip_address'] | regex_replace('/.*', '') }}"

    - name: 'Display hub pod CUDN IP'
      ansible.builtin.debug:
        msg:
          - "Hub pod CUDN IP: {{ hub_pod_cudn_ip }}"
          - "EgressIP is still active (172.16.252.70) — but cross-cluster traffic should NOT use it"

    - name: 'Cross-cluster tcpdump: prove source is CUDN IP, not EgressIP'
      kubernetes.core.k8s_exec:
        namespace: cudn-spoke-ns
        pod: spoke-test
        container: test
        command: >-
          sh -c 'tcpdump -c 4 -nn -l -i any icmp 2>/dev/null &
          TCPDUMP_PID=$!;
          sleep 1;
          ping -c 2 -W 5 {{ hub_pod_cudn_ip }};
          wait $TCPDUMP_PID'
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __crosscluster_tcpdump
      ignore_errors: true

    - name: 'Display cross-cluster tcpdump (expect CUDN IPs, not 172.16.252.70)'
      ansible.builtin.debug:
        msg:
          - "Cross-cluster traffic source/dest should be CUDN IPs (10.x.x.x),"
          - "NOT the EgressIP (172.16.252.70):"
          - ""
          - "{{ __crosscluster_tcpdump.stdout_lines | default([]) }}"

    - name: 'Verify hub -> spoke ping over CUDN (with EgressIP active)'
      kubernetes.core.k8s_exec:
        namespace: cudn-hub-ns
        pod: egress-test
        command: "ping -c 3 -W 5 {{ spoke_pod_ip }}"
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_to_spoke_ping
      ignore_errors: true

    - name: 'Display hub -> spoke cross-cluster ping'
      ansible.builtin.debug:
        msg: "{{ __hub_to_spoke_ping.stdout_lines | default(__hub_to_spoke_ping.stderr_lines) }}"

  tags: ['phase3']

# === Cleanup: remove ICMP logging ACL ===
- name: 'Cleanup: Remove ICMP logging ACL from c8000v'
  hosts: c8000v
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_host: "{{ c8000v_host }}"
    ansible_user: "{{ c8000v_user }}"
    ansible_password: "{{ c8000v_password | default(omit) }}"
    ansible_ssh_private_key_file: "{{ c8000v_ssh_key | default(omit) }}"
    ansible_paramiko_look_for_keys: false

  tasks:
    - name: 'Remove ACL from interface'
      ansible.netcommon.cli_config:
        config: |
          interface GigabitEthernet1
           no ip access-group ICMP-LOG in
          !
          no ip access-list extended ICMP-LOG
          !
          end

# === Summary ===
- name: 'Lab 03 Summary'
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: 'Summary'
      ansible.builtin.debug:
        msg:
          - "=== Lab 03: EgressIP and Pod Identity ==="
          - ""
          - "1. DEFAULT IDENTITY: Without EgressIP, pod egress traffic uses the"
          - "   node IP as source (SNAT). Identity changes with pod scheduling."
          - ""
          - "2. EGRESSIP IDENTITY: With EgressIP CR applied, all egress from"
          - "   cudn-hub-ns uses 172.16.252.70 as source IP, regardless of"
          - "   which node the pod runs on. Stable external identity."
          - ""
          - "3. CROSS-CLUSTER IDENTITY: When hub pod communicates with spoke"
          - "   pod over the CUDN BGP route, the source IP is the pod's CUDN"
          - "   IP (10.100.x.x). EgressIP does NOT affect this traffic."
          - ""
          - "TWO IDENTITY BOUNDARIES:"
          - "  External (pod -> c8000v/beyond): controlled by EgressIP"
          - "  Cross-cluster (hub <-> spoke CUDN): always the pod CUDN IP"
