---
# Second NIC (lab-network-253) IP configuration for hub nodes.
# The interface name depends on the PCI slot assigned by virsh attach-interface.
# These NNCPs use MAC address matching to identify the correct interface.
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: spine2-master-1
spec:
  nodeSelector:
    kubernetes.io/hostname: hcp-master-1
  desiredState:
    interfaces:
    - name: spine2
      type: ethernet
      state: up
      identifier: mac-address
      mac-address: "de:ad:be:ef:53:61"
      ipv4:
        enabled: true
        dhcp: false
        address:
        - ip: 172.16.253.61
          prefix-length: 24
      ipv6:
        enabled: false
---
