---
# Second NIC (lab-network-253) IP configuration for spoke worker.
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: spine2-worker-1
spec:
  nodeSelector:
    kubernetes.io/hostname: hcp1-worker-1
  desiredState:
    interfaces:
    - name: spine2
      type: ethernet
      state: up
      identifier: mac-address
      mac-address: "de:ad:be:ef:53:64"
      ipv4:
        enabled: true
        dhcp: false
        address:
        - ip: 172.16.253.64
          prefix-length: 24
      ipv6:
        enabled: false
