---
# Lab 03: EgressIP and Dual-Spine ECMP Load Balancing
#
# Topology: Two c8000v routers (AS 64514, iBGP) on separate L2 segments.
# Each cluster node is dual-homed to both routers for ECMP.
#
# Prerequisites:
#   ansible-playbook common/setup.yaml
#
# Run it with:
#   ansible-playbook lab03-egressip/lab03.yaml
#
# Individual phases:
#   ansible-playbook lab03-egressip/lab03.yaml -t nmstate
#   ansible-playbook lab03-egressip/lab03.yaml -t hub
#   ansible-playbook lab03-egressip/lab03.yaml -t spoke
#   ansible-playbook lab03-egressip/lab03.yaml -t c8000v

- name: 'Pre-check: Verify common setup is complete'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  tasks:
    - name: 'Check FRR-K8s pods on hub cluster'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: openshift-frr-k8s
        label_selectors:
          - "app=frr-k8s"
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_frr_pods

    - name: 'Check FRR-K8s pods on spoke cluster'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: openshift-frr-k8s
        label_selectors:
          - "app=frr-k8s"
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_frr_pods

    - name: 'Fail if common setup has not been run'
      ansible.builtin.fail:
        msg: >-
          FRR-K8s pods are not running.
          Run 'ansible-playbook common/setup.yaml' first.
      when: >
        __hub_frr_pods.resources | length == 0 or
        __spoke_frr_pods.resources | length == 0

- name: 'Install NMState operator on hub'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Check if NMState operator is already installed'
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        name: kubernetes-nmstate-operator
        namespace: openshift-nmstate
      register: __nmstate_sub

    - name: 'Install NMState operator'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/../lab04-vrf-lite/manifest/nmstate-operator.yaml"
      when: __nmstate_sub.resources | length == 0

    - name: 'Wait for NMState operator to be ready'
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: openshift-nmstate
        label_selectors:
          - "app=kubernetes-nmstate-operator"
      register: __nmstate_deploy
      until: >
        __nmstate_deploy.resources | length > 0 and
        __nmstate_deploy.resources[0].status.readyReplicas | default(0) > 0
      retries: 60
      delay: 10

    - name: 'Create NMState instance'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/../lab04-vrf-lite/manifest/nmstate-instance.yaml"

    - name: 'Wait for NMState handler pods to be ready'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: openshift-nmstate
        label_selectors:
          - "component=kubernetes-nmstate-handler"
      register: __nmstate_handlers
      until: >
        __nmstate_handlers.resources | length > 0 and
        __nmstate_handlers.resources |
        selectattr('status.phase', 'equalto', 'Running') |
        list | length == __nmstate_handlers.resources | length
      retries: 60
      delay: 10

  tags: ['nmstate']

- name: 'Install NMState operator on spoke'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "{{ spoke_kubeconfig }}"

  tasks:
    - name: 'Check if NMState operator is already installed on spoke'
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: Subscription
        name: kubernetes-nmstate-operator
        namespace: openshift-nmstate
      register: __spoke_nmstate_sub

    - name: 'Install NMState operator on spoke'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/../lab04-vrf-lite/manifest/nmstate-operator.yaml"
      when: __spoke_nmstate_sub.resources | length == 0

    - name: 'Wait for NMState operator on spoke'
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: openshift-nmstate
        label_selectors:
          - "app=kubernetes-nmstate-operator"
      register: __spoke_nmstate_deploy
      until: >
        __spoke_nmstate_deploy.resources | length > 0 and
        __spoke_nmstate_deploy.resources[0].status.readyReplicas | default(0) > 0
      retries: 60
      delay: 10

    - name: 'Create NMState instance on spoke'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/../lab04-vrf-lite/manifest/nmstate-instance.yaml"

    - name: 'Wait for NMState handler pods on spoke'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: openshift-nmstate
        label_selectors:
          - "component=kubernetes-nmstate-handler"
      register: __spoke_nmstate_handlers
      until: >
        __spoke_nmstate_handlers.resources | length > 0 and
        __spoke_nmstate_handlers.resources |
        selectattr('status.phase', 'equalto', 'Running') |
        list | length == __spoke_nmstate_handlers.resources | length
      retries: 60
      delay: 10

  tags: ['nmstate']

- name: 'Configure second NIC IPs on hub nodes (NNCPs)'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Apply spine2 NNCPs for hub nodes'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/nncp-spine2.yaml"

    - name: 'Wait for hub spine2 NNCPs to be available'
      kubernetes.core.k8s_info:
        api_version: nmstate.io/v1
        kind: NodeNetworkConfigurationPolicy
        label_selectors: []
      register: __hub_nncp
      until: >
        __hub_nncp.resources |
        selectattr('metadata.name', 'match', 'spine2-master') |
        list | length == 3
      retries: 60
      delay: 10
      ignore_errors: true

  tags: ['nmstate']

- name: 'Configure second NIC IP on spoke worker (NNCP)'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "{{ spoke_kubeconfig }}"

  tasks:
    - name: 'Apply spine2 NNCP for spoke worker'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/spoke-nncp-spine2.yaml"

    - name: 'Wait for spoke spine2 NNCP to be available'
      kubernetes.core.k8s_info:
        api_version: nmstate.io/v1
        kind: NodeNetworkConfigurationPolicy
        name: spine2-worker-1
      register: __spoke_nncp
      until: __spoke_nncp.resources | length > 0
      retries: 60
      delay: 10
      ignore_errors: true

  tags: ['nmstate']

- name: 'Hub cluster - Label nodes as egress-assignable'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Get hub cluster nodes'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
      register: __hub_nodes

    - name: 'Label nodes as egress-assignable'
      kubernetes.core.k8s:
        state: patched
        api_version: v1
        kind: Node
        name: "{{ item.metadata.name }}"
        definition:
          metadata:
            labels:
              k8s.ovn.org/egress-assignable: ""
      loop: "{{ __hub_nodes.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

  tags: ['hub']

- name: 'Hub cluster - Create CUDN and BGP peering'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Apply hub CUDN manifests'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/hub-cudn.yaml"
      register: __hub_cudn
      until: __hub_cudn is not failed
      retries: 5
      delay: 10

    - name: 'Wait for CUDN to be ready'
      kubernetes.core.k8s_info:
        api_version: k8s.ovn.org/v1
        kind: ClusterUserDefinedNetwork
        name: hub-network
      register: __hub_cudn_status
      until: __hub_cudn_status.resources | length > 0
      retries: 30
      delay: 10

    - name: 'Apply hub BGP peering configuration'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/hub-bgp.yaml"
      register: __hub_bgp
      until: __hub_bgp is not failed
      retries: 5
      delay: 10

    - name: 'Wait for BGP sessions to establish'
      kubernetes.core.k8s_info:
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRNodeState
        namespace: openshift-frr-k8s
      register: __hub_bgp_state
      until: __hub_bgp_state.resources | length > 0
      retries: 30
      delay: 10
      ignore_errors: true

  tags: ['hub']

- name: 'Spoke cluster - Create CUDN and BGP peering'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "{{ spoke_kubeconfig }}"

  tasks:
    - name: 'Apply spoke CUDN manifests'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/spoke-cudn.yaml"
      register: __spoke_cudn
      until: __spoke_cudn is not failed
      retries: 5
      delay: 10

    - name: 'Wait for spoke CUDN to be ready'
      kubernetes.core.k8s_info:
        api_version: k8s.ovn.org/v1
        kind: ClusterUserDefinedNetwork
        name: spoke-network
      register: __spoke_cudn_status
      until: __spoke_cudn_status.resources | length > 0
      retries: 30
      delay: 10

    - name: 'Apply spoke BGP peering configuration'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/spoke-bgp.yaml"
      register: __spoke_bgp
      until: __spoke_bgp is not failed
      retries: 5
      delay: 10

  tags: ['spoke']

