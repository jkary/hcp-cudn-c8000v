---
# Lab 03: EgressIP and Pod Identity
#
# Demonstrates EgressIP for stable pod identity on the single c8000v topology.
# Three identity scenarios: default SNAT, EgressIP, and cross-cluster CUDN.
#
# Prerequisites:
#   ansible-playbook common/setup.yaml
#
# Run it with:
#   ansible-playbook lab03-egressip/lab03.yaml
#
# Individual phases:
#   ansible-playbook lab03-egressip/lab03.yaml -t hub
#   ansible-playbook lab03-egressip/lab03.yaml -t spoke

- name: 'Pre-check: Verify common setup is complete'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  tasks:
    - name: 'Check FRR-K8s pods on hub cluster'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: openshift-frr-k8s
        label_selectors:
          - "app=frr-k8s"
      environment:
        KUBECONFIG: "{{ hub_kubeconfig }}"
      register: __hub_frr_pods

    - name: 'Check FRR-K8s pods on spoke cluster'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: openshift-frr-k8s
        label_selectors:
          - "app=frr-k8s"
      environment:
        KUBECONFIG: "{{ spoke_kubeconfig }}"
      register: __spoke_frr_pods

    - name: 'Fail if common setup has not been run'
      ansible.builtin.fail:
        msg: >-
          FRR-K8s pods are not running.
          Run 'ansible-playbook common/setup.yaml' first.
      when: >
        __hub_frr_pods.resources | length == 0 or
        __spoke_frr_pods.resources | length == 0

- name: 'Hub cluster - Label nodes as egress-assignable'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Get hub cluster nodes'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
      register: __hub_nodes

    - name: 'Label nodes as egress-assignable'
      kubernetes.core.k8s:
        state: patched
        api_version: v1
        kind: Node
        name: "{{ item.metadata.name }}"
        definition:
          metadata:
            labels:
              k8s.ovn.org/egress-assignable: ""
      loop: "{{ __hub_nodes.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

  tags: ['hub']

- name: 'Hub cluster - Create CUDN and BGP peering'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Apply hub CUDN manifests'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/hub-cudn.yaml"
      register: __hub_cudn
      until: __hub_cudn is not failed
      retries: 5
      delay: 10

    - name: 'Wait for CUDN to be ready'
      kubernetes.core.k8s_info:
        api_version: k8s.ovn.org/v1
        kind: ClusterUserDefinedNetwork
        name: hub-network
      register: __hub_cudn_status
      until: __hub_cudn_status.resources | length > 0
      retries: 30
      delay: 10

    - name: 'Apply hub BGP peering configuration'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/hub-bgp.yaml"
      register: __hub_bgp
      until: __hub_bgp is not failed
      retries: 5
      delay: 10

    - name: 'Wait for BGP sessions to establish'
      kubernetes.core.k8s_info:
        api_version: frrk8s.metallb.io/v1beta1
        kind: FRRNodeState
        namespace: openshift-frr-k8s
      register: __hub_bgp_state
      until: __hub_bgp_state.resources | length > 0
      retries: 30
      delay: 10
      ignore_errors: true

  tags: ['hub']

- name: 'Hub cluster - Apply EgressIP'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Apply EgressIP CR'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/hub-egressip.yaml"
      register: __egressip
      until: __egressip is not failed
      retries: 5
      delay: 10

    - name: 'Wait for EgressIP to be assigned'
      kubernetes.core.k8s_info:
        api_version: k8s.ovn.org/v1
        kind: EgressIP
        name: hub-egressip
      register: __egressip_status
      until: >
        __egressip_status.resources | length > 0 and
        __egressip_status.resources[0].get('status', {}).get('items', []) | length > 0
      retries: 30
      delay: 10
      ignore_errors: true

    - name: 'Display EgressIP assignment'
      ansible.builtin.debug:
        msg: "EgressIP assigned: {{ __egressip_status.resources[0].status }}"
      when: >
        __egressip_status is not failed and
        __egressip_status.resources | default([]) | length > 0 and
        __egressip_status.resources[0].status is defined

  tags: ['hub']

- name: 'Hub cluster - Deploy test pod'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"

  tasks:
    - name: 'Label hub namespace for privileged pod security'
      kubernetes.core.k8s:
        state: patched
        api_version: v1
        kind: Namespace
        name: cudn-hub-ns
        definition:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: privileged

    - name: 'Delete existing hub test pod (if spec changed)'
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Pod
        name: egress-test
        namespace: cudn-hub-ns
        wait: true

    - name: 'Deploy test pod on hub CUDN'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: egress-test
            namespace: cudn-hub-ns
            labels:
              app: cudn-test
          spec:
            containers:
            - name: test
              image: docker.io/nicolaka/netshoot:latest
              command: ["/bin/sh", "-c", "sleep infinity"]
              securityContext:
                capabilities:
                  add: ["NET_RAW"]

    - name: 'Wait for test pod to be running'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: egress-test
        namespace: cudn-hub-ns
      register: __test_pod
      until: >
        __test_pod.resources | length > 0 and
        __test_pod.resources[0].status.phase == 'Running'
      retries: 30
      delay: 10

    - name: 'Display test pod placement'
      ansible.builtin.debug:
        msg:
          - "Test pod: {{ __test_pod.resources[0].metadata.name }}"
          - "Node: {{ __test_pod.resources[0].spec.nodeName }}"
          - "Host IP: {{ __test_pod.resources[0].status.hostIP }}"

  tags: ['hub']

- name: 'Spoke cluster - Create CUDN and BGP peering'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  vars:
    lab_local_path: "{{ playbook_dir }}"

  environment:
    KUBECONFIG: "{{ spoke_kubeconfig }}"

  tasks:
    - name: 'Apply spoke CUDN manifests'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/spoke-cudn.yaml"
      register: __spoke_cudn
      until: __spoke_cudn is not failed
      retries: 5
      delay: 10

    - name: 'Wait for spoke CUDN to be ready'
      kubernetes.core.k8s_info:
        api_version: k8s.ovn.org/v1
        kind: ClusterUserDefinedNetwork
        name: spoke-network
      register: __spoke_cudn_status
      until: __spoke_cudn_status.resources | length > 0
      retries: 30
      delay: 10

    - name: 'Apply spoke BGP peering configuration'
      kubernetes.core.k8s:
        state: present
        src: "{{ lab_local_path }}/manifest/spoke-bgp.yaml"
      register: __spoke_bgp
      until: __spoke_bgp is not failed
      retries: 5
      delay: 10

  tags: ['spoke']

- name: 'Spoke cluster - Deploy test pod'
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../common/manifest/vars.yaml

  environment:
    KUBECONFIG: "{{ spoke_kubeconfig }}"

  tasks:
    - name: 'Label spoke namespace for privileged pod security'
      kubernetes.core.k8s:
        state: patched
        api_version: v1
        kind: Namespace
        name: cudn-spoke-ns
        definition:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: privileged

    - name: 'Delete existing spoke test pod (if spec changed)'
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Pod
        name: spoke-test
        namespace: cudn-spoke-ns
        wait: true

    - name: 'Deploy test pod on spoke CUDN'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: spoke-test
            namespace: cudn-spoke-ns
            labels:
              app: cudn-test
          spec:
            containers:
            - name: test
              image: docker.io/nicolaka/netshoot:latest
              command: ["/bin/sh", "-c", "sleep infinity"]
              securityContext:
                capabilities:
                  add: ["NET_RAW", "NET_ADMIN"]

    - name: 'Wait for spoke test pod to be running'
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        name: spoke-test
        namespace: cudn-spoke-ns
      register: __spoke_pod
      until: >
        __spoke_pod.resources | length > 0 and
        __spoke_pod.resources[0].status.phase == 'Running'
      retries: 30
      delay: 10

    - name: 'Display spoke test pod placement'
      ansible.builtin.debug:
        msg:
          - "Test pod: {{ __spoke_pod.resources[0].metadata.name }}"
          - "Node: {{ __spoke_pod.resources[0].spec.nodeName }}"

  tags: ['spoke']
